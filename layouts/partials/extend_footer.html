{{- if .IsPage }}
<style>
#view-badge {
  display: none;
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  background: rgba(0,0,0,0.78);
  color: #fff;
  font-size: 0.73rem;
  padding: 0.35rem 0.75rem;
  border-radius: 999px;
  z-index: 9999;
  backdrop-filter: blur(6px);
  pointer-events: none;
  letter-spacing: 0.02em;
  user-select: none;
}
</style>
<div id="view-badge">👁 <span id="view-count">…</span></div>
<script>
(function () {
  var SUPABASE_URL = 'https://epflfhnddqkdktjfxqgb.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwZmxmaG5kZHFrZGt0amZ4cWdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzYzNjYsImV4cCI6MjA4OTE1MjM2Nn0.T9WrJvQJOeprFESEil1BKhqrUSrB6dVQO3lSY0C0xw8';

  var isOwner = new URLSearchParams(window.location.search).get('owner') === '1'
    || localStorage.getItem('blog_owner') === '1';

  if (!isOwner) return;

  var badge = document.getElementById('view-badge');
  var countEl = document.getElementById('view-count');
  var path = window.location.pathname;

  // URL에 ?owner=1 있으면 localStorage에도 저장 (다음부터 자동)
  if (new URLSearchParams(window.location.search).get('owner') === '1') {
    localStorage.setItem('blog_owner', '1');
  }

  var isOwner = new URLSearchParams(window.location.search).get('owner') === '1'
    || localStorage.getItem('blog_owner') === '1';

  // 24시간 내 같은 페이지 중복 카운트 방지
  var dedupKey = 'vc_' + path;
  var lastSeen = localStorage.getItem(dedupKey);
  var alreadyCounted = lastSeen && (Date.now() - parseInt(lastSeen)) < 86400000;

  if (alreadyCounted) {
    // 카운트 증가 없이 현재 숫자만 조회 (오너에게만 표시)
    if (!isOwner) return;
    fetch(SUPABASE_URL + '/rest/v1/page_views?select=view_count&page_path=eq.' + encodeURIComponent(path), {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var count = data[0] ? data[0].view_count : 0;
      countEl.textContent = Number(count).toLocaleString() + ' views';
      badge.style.display = 'block';
    })
    .catch(function() {});
  } else {
    // 모든 방문자: 조회수 증가
    fetch(SUPABASE_URL + '/rest/v1/rpc/increment_view', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ p_path: path })
    })
    .then(function(r) { return r.json(); })
    .then(function(count) {
      localStorage.setItem(dedupKey, String(Date.now()));
      // 오너만 배지 표시
      if (!isOwner) return;
      countEl.textContent = Number(count).toLocaleString() + ' views';
      badge.style.display = 'block';
    })
    .catch(function() {});
  }
})();
</script>
{{- end }}
